name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Verify Checkstyle
        run: mvn checkstyle:check
      - name: Verify SpotBugs
        run: mvn spotbugs:check
      - name: Build + Test
        run: mvn -B verify
  notify-failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL_CI }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CONCLUSION: failure
        run: |
          payload=$(jq -n \
            --arg repo "$REPO" \
            --arg workflow "$WORKFLOW" \
            --arg actor "$ACTOR" \
            --arg url "$RUN_URL" \
            --arg conclusion "$CONCLUSION" \
            '{
              content: "**Pipeline failed** :(( <@&1453490417264754749><@&1453490988923224148>",
              embeds: [
                {
                  title: "\($workflow) – \($conclusion)",
                  url: $url,
                  description: "**Repo:** \($repo)\n**Thrown by:** \($actor)",
                  color: 15158332
                }
              ]
            }')
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK"

