name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Verify Checkstyle
        run: mvn checkstyle:check
      - name: Verify SpotBugs
        run: mvn spotbugs:check
      - name: Build + Test
        run: mvn -B verify

