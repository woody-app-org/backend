name: Notify Discord on Pipeline Failure

on:
  workflow_run:
    workflows: ["Java CI"]
    types:
      - completed

jobs:
  notify-failure:
    if: ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Send failure notification to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL_CI }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          WORKFLOW: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          payload=$(jq -n \
            --arg repo "$REPO" \
            --arg workflow "$WORKFLOW" \
            --arg actor "$ACTOR" \
            --arg url "$RUN_URL" \
            --arg conclusion "$CONCLUSION" \
            '{
              content: "**Pipeline failed** :(( <@&1453490417264754749><@&1453490988923224148>",
              embeds: [
                {
                  title: "\($workflow) – \($conclusion)",
                  url: $url,
                  description: "**Repo:** \($repo)\n**Thrown by:** \($actor)",
                  color: 15158332
                }
              ]
            }')

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$WEBHOOK"
